<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Study Planner PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg,#1d2671,#c33764);
  color: white;
}

.card {
  border-radius: 15px;
}

.subject-box {
  padding: 8px;
  border-radius: 8px;
  background: #ffffff20;
  margin: 5px;
  display:flex;
  justify-content:space-between;
}

.clock {
  width: 150px;
  height: 150px;
  border: 5px solid white;
  border-radius: 50%;
  position: relative;
  margin: auto;
}

.hand {
  position: absolute;
  width: 50%;
  background: white;
  top: 50%;
  transform-origin: 100%;
}

.hour { height: 4px; }
.minute { height: 3px; }
.second { height: 2px; background: red; }

</style>
</head>

<body>

<div class="container py-4">

<h1 class="text-center mb-4">📚 Smart Study Planner PRO</h1>

<!-- CLOCK -->
<div class="card p-3 mb-3 text-dark text-center">
<h5>🕒 Live Clock</h5>
<div id="digital"></div>

<div class="clock mt-2">
  <div class="hand hour" id="hour"></div>
  <div class="hand minute" id="minute"></div>
  <div class="hand second" id="second"></div>
</div>
</div>

<!-- ADD SUBJECT -->
<div class="card p-3 mb-3 text-dark">
<h5>Add Subject</h5>

<input id="subName" class="form-control my-2" placeholder="Subject name">
<input id="subHours" type="number" class="form-control my-2" placeholder="Hours">

<button class="btn btn-primary" onclick="addSubject()">Add</button>
</div>

<!-- SUBJECT LIST -->
<div class="card p-3 mb-3 text-dark">
<h5>Your Subjects</h5>
<div id="subjects"></div>
</div>

<!-- TIMETABLE -->
<div class="card p-3 mb-3 text-dark">
<h5>Timetable</h5>

<button class="btn btn-success mb-2" onclick="generateTT()">Generate</button>

<table class="table table-bordered">
<thead>
<tr>
<th>S.No</th>
<th>Subject</th>
<th>Start</th>
<th>End</th>
</tr>
</thead>
<tbody id="ttBody"></tbody>
</table>

</div>

<!-- TIMER -->
<div class="card p-3 mb-3 text-dark">
<h5>Study Timer</h5>

<input id="minutes" type="number" class="form-control my-2" placeholder="Minutes">

<button class="btn btn-warning" onclick="startTimer()">Start</button>

<h3 id="timer">00:00</h3>
</div>

</div>

<audio id="alarm">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

let subjects = JSON.parse(localStorage.getItem("subjects")) || [];

function save(){
 localStorage.setItem("subjects",JSON.stringify(subjects));
}

function addSubject(){
 let name = subName.value;
 let hours = subHours.value;

 if(!name || !hours) return alert("Fill all");

 subjects.push({name,hours});
 save();
 renderSubjects();
}

function deleteSubject(i){
 subjects.splice(i,1);
 save();
 renderSubjects();
}

function renderSubjects(){
 let box = document.getElementById("subjects");
 box.innerHTML="";

 subjects.forEach((s,i)=>{
   box.innerHTML += `
   <div class="subject-box">
     ${s.name} - ${s.hours}h
     <button onclick="deleteSubject(${i})" class="btn btn-danger btn-sm">❌</button>
   </div>`;
 });
}

function generateTT(){
 let body = document.getElementById("ttBody");
 body.innerHTML="";

 let start = 8;

 subjects.forEach((s,i)=>{
   let end = start + parseInt(s.hours);

   body.innerHTML += `
   <tr>
     <td>${i+1}</td>
     <td>${s.name}</td>
     <td>${start}:00</td>
     <td>${end}:00</td>
   </tr>
   `;

   start = end;
 });
}

// TIMER
let timerInterval;

function startTimer(){
 let min = minutes.value;
 if(!min) return alert("Enter minutes");

 let time = min*60;

 clearInterval(timerInterval);

 timerInterval = setInterval(()=>{
   let m = Math.floor(time/60);
   let s = time%60;

   timer.innerText = `${m}:${s}`;

   time--;

   if(time<0){
     clearInterval(timerInterval);
     alarm.play();
     alert("Time up!");
   }

 },1000);
}

// CLOCK
function updateClock(){
 let now = new Date();

 let h = now.getHours()%12;
 let m = now.getMinutes();
 let s = now.getSeconds();

 document.getElementById("digital").innerText =
   now.toLocaleTimeString();

 hour.style.transform = `rotate(${h*30 + m/2}deg)`;
 minute.style.transform = `rotate(${m*6}deg)`;
 second.style.transform = `rotate(${s*6}deg)`;
}

setInterval(updateClock,1000);

renderSubjects();

</script>

</body>
</html>
